<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>朗読プロンプター</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
}

#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#1f2937;
    color:white;
}

#logoArea{
    display:flex;
    align-items:center;
    gap:12px;
}

#logo{
    height:42px;
}

#title{
    font-size:24px;
    font-weight:bold;
}

#timer{
    font-size:24px;
    font-weight:bold;
}

#viewer{
    position:relative;
    height:calc(100vh - 70px);
    overflow:hidden;
    background:white;
}

#pages{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

#pages{
    position:absolute;
    left:0;
    top:0;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    transition:transform 0.05s linear;
}

#guideLine{
    position:absolute;

    top:65%;
    left:0;

    width:100%;
    height:2px;

    background:red;

    pointer-events:none;
}

#controlArea{
    display:flex;
    align-items:center;
    gap:10px;
}

#controlArea button{
    width:36px;
    height:36px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<header id="header">

    <div id="logoArea">
        <img src="トータルロゴ.png" id="logo">
        <span id="title">朗読プロンプター</span>
    </div>

    <div id="controlArea">

        <button id="playBtn">▶</button>

        <button id="pauseBtn">⏸</button>

        <button id="resetBtn">⏮</button>

        <button id="speedDownBtn">－</button>

        <span id="speedText">1.0</span>

        <button id="speedUpBtn">＋</button>

        <button id="modeBtn">📚</button>

        <div id="timer">00:00</div>

    </div>
</header>

<main id="viewer">

    <div id="pages">
        <img src="mina/lesson01/001.jpg" id="page1">
    </div>

    <div id="guideLine"></div>

</main>

<script>

let y = 0;

const pages = document.getElementById("pages");

document.addEventListener("wheel",(e)=>{

    e.preventDefault();

    y -= e.deltaY * 0.5;

    pages.style.transform = `translateY(${y}px)`;

},{passive:false});

let speed = 1.0;
let autoScroll = null;

document.getElementById("playBtn").onclick = () => {

    if(autoScroll) return;

    autoScroll = setInterval(() => {

        y -= speed;
        pages.style.transform = `translateY(${y}px)`;

    },16);

};

document.getElementById("pauseBtn").onclick = () => {

    clearInterval(autoScroll);
    autoScroll = null;

};

// 表示更新
function updateSpeed(){

    document.getElementById("speedText").textContent = speed.toFixed(1);

}

// ＋
document.getElementById("speedUpBtn").onclick=()=>{

    speed +=0.2;

    updateSpeed();

};

// －
document.getElementById("speedDownBtn").onclick=()=>{

    if(speed>0.2){

        speed -=0.2;

        updateSpeed();

    }

};

// リセット
document.getElementById("resetBtn").onclick=()=>{

    clearInterval(autoScroll);

    autoScroll=null;

    y=0;

    pages.style.transform=`translateY(${y}px)`;

};

let mode = "lesson";

const modeBtn = document.getElementById("modeBtn");

modeBtn.onclick = ()=>{

    if(mode==="lesson"){

        mode="contest";

        modeBtn.textContent="🏆";

        document.getElementById("speedDownBtn").style.display="none";
        document.getElementById("speedUpBtn").style.display="none";
        document.getElementById("speedText").style.display="none";

    }else{

        mode="lesson";

        modeBtn.textContent="📚";

        document.getElementById("speedDownBtn").style.display="";
        document.getElementById("speedUpBtn").style.display="";
        document.getElementById("speedText").style.display="";

    }

};

updateSpeed();

</script>

</body>
</html>
