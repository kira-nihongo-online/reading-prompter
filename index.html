<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>朗読プロンプター</title>

<style>

/*==================================================
  基本
==================================================*/

body{
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
}


/*==================================================
  ヘッダー
==================================================*/

#header{
    display:flex;
    align-items:center;
    padding:10px 20px;
    background:#1f2937;
    color:white;
}

#logoArea{
    display:flex;
    align-items:center;
    gap:12px;
}

#modeArea{
    flex:1;
    display:flex;
    justify-content:center;
}

#modeBtn{
    width:auto;
    height:36px;
    padding:0 12px;
    white-space:nowrap;
}

#logo{
    height:42px;
}

#title{
    font-size:24px;
    font-weight:bold;
}

#timer{
    font-size:24px;
    font-weight:bold;
}

#timerInput{
    width:60px;
    border:none;
    background:transparent;
    color:white;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    outline:none;
}

/*==================================================
  ビューア
==================================================*/

#viewer{
    position:relative;
    height:calc(100vh - 70px);
    overflow:hidden;
    background:white;
}

#pages{
    position:absolute;
    left:0;
    top:0;

    width:100%;
    height:100%;

    display:flex;
    flex-direction: column;

    justify-content:flex-start;
    align-items:flex-start;

    transition:transform 0.05s linear;
}

#guideLine{

    position:absolute;

    top:65%;
    left:0;

    width:100%;
    height:2px;

    background:#ff2020;

    z-index:100;

}

#guideHandle{

    position:absolute;

    left:0;
    top:-2px;

    width:180px;
    height:38px;

    background:#c40000;

    color:white;

    font-size:15px;
    font-weight:bold;

    display:flex;

    align-items:center;
    justify-content:center;

    cursor:ns-resize;

    user-select:none;

    clip-path:polygon(
        0% 0%,
        100% 0%,
        90% 78%,
        50% 100%,
        10% 78%
    );

    box-shadow:
        0 3px 8px rgba(0,0,0,.35);

}


/*==================================================
  コントロール
==================================================*/

#controlArea{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:flex-end;
}

#controlArea button{
    width:36px;
    height:36px;
    font-size:18px;
    cursor:pointer;
}

#modeBtn{
    width:auto;
    padding:0 12px;
}

</style>

</head>

<body>


<!--==================================================
    ヘッダー
===================================================-->

<header id="header">

    <!-- 左 -->
    <div id="logoArea">
        <img src="トータルロゴ.png" id="logo">
        <span id="title">朗読プロンプター</span>
    </div>

    <!-- 中央 -->
    <div id="modeArea">
        <button id="modeBtn">授業モード</button>
    </div>

    <!-- 右 -->
    <div id="controlArea">

        <button id="playBtn">▶</button>

        <button id="pauseBtn">⏸</button>

        <button id="resetBtn">⏮</button>

        <button id="soundBtn" title="音声 OFF">🔇</button>

        <button id="speedDownBtn">－</button>

        <span id="speedText">1.0</span>

        <button id="speedUpBtn">＋</button>

        <div id="timer">
            <span>⏱</span>

            <input
                id="timerInput"
                type="text"
                value="00:00"
                maxlength="5"
                readonly
            >
        </div>

    </div>

</header>

<!--==================================================
    ビューア
===================================================-->

<main id="viewer">

    <div id="pages"></div>

    <div id="guideLine">

        <div id="guideHandle">

            ☰&nbsp;&nbsp;READ LINE

        </div>

    </div>

</main>


<!--==================================================
    JavaScript
===================================================-->

<script>


//==================================================
// 変数
//==================================================

let y = 0;
let speed = 1.0;
let autoScroll = null;
let mode = "lesson";

let contestTime = 0;
let autoSpeed = 0;

let timerInterval = null;
let remainingTime = 0;

let soundEnabled = false;
let contestTTSPlayed = false;

// URLから lesson を取得
const params = new URLSearchParams(window.location.search);

const lessonNo = params.get("lesson") || "1";

let currentLesson = `lesson${lessonNo.padStart(2, "0")}`;

const currentContest = params.get("contest") || "sample";

let lessonAudio = new Audio(`mina/${currentLesson}/${currentLesson}.mp3`);

//==================================================
// TTS
//==================================================

const Voice = (function(){

    let ready = false;
    let voiceJP = null;

    function init(){

        const setVoices = () => {

            const voices = speechSynthesis.getVoices();

            voiceJP =
                voices.find(v => v.name.includes("七海")) ||
                voices.find(v => v.lang === "ja-JP");

            if(voiceJP){
                ready = true;
            }

        };

        setVoices();

        speechSynthesis.onvoiceschanged = setVoices;

    }

    function speakJP(text){

        if(!ready) return;
        if(!text) return;

        const uttr = new SpeechSynthesisUtterance(text);

        uttr.lang = "ja-JP";
        uttr.rate = 1;
        uttr.pitch = 1;
        uttr.volume = 1;

        uttr.voice = voiceJP;

        speechSynthesis.cancel();

        setTimeout(() => {

            speechSynthesis.speak(uttr);

        },50);

    }

    return{

        init,
        speakJP

    };

})();

//==================================================
// コンテストTTS取得
//==================================================

async function getContestTTS(contest){

    const res = await fetch(
        "https://script.google.com/macros/s/AKfycbw7hnyd3dQW9jiDKpOBpGtJB5qf7erSztbbauHjehsQ14xRMiqziGF5SWT3_USKtEwG1w/exec?lesson=" + lesson
    );

    return await res.text();

}

//==================================================
// 要素取得
//==================================================

const pages = document.getElementById("pages");
const modeBtn = document.getElementById("modeBtn");
const timerInput = document.getElementById("timerInput");

const viewer = document.getElementById("viewer");
const page1 = document.getElementById("page1");

const soundBtn = document.getElementById("soundBtn");

const guideLine = document.getElementById("guideLine");

async function loadImages() {

    pages.innerHTML = "";

    for (let i = 1; i <= 10; i++) {

        const no = String(i).padStart(3, "0");

        let imageFolder;

        if(mode === "lesson"){

            imageFolder = `mina/${currentLesson}`;

        }else{

            imageFolder = `contest/${currentContest}`;

        }

        const src = `${imageFolder}/${no}.jpg`;

        const img = new Image();

        const loaded = await new Promise(resolve => {

            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);

            img.src = src;

        });

        if (!loaded) break;

        pages.appendChild(img);

    }

    lessonAudio.pause();
    lessonAudio = new Audio(`mina/${currentLesson}/${currentLesson}.mp3`);
    lessonAudio.currentTime = 0;

}

//==================================================
// ガイドライン移動
//==================================================

let draggingGuide = false;

const guideHandle = document.getElementById("guideHandle");

guideHandle.addEventListener("mousedown", () => {

    draggingGuide = true;

});

document.addEventListener("mouseup", () => {

    draggingGuide = false;

});

document.addEventListener("mousemove", (e) => {

    if (!draggingGuide) return;

    const rect = viewer.getBoundingClientRect();

    let y = e.clientY - rect.top;

    if (y < 0) y = 0;
    if (y > rect.height) y = rect.height;

    guideLine.style.top = y + "px";

});

//==================================================
// 手動スクロール
//==================================================

document.addEventListener("wheel",(e)=>{

    e.preventDefault();

    y -= e.deltaY * 0.5;

    pages.style.transform = `translateY(${y}px)`;

},{passive:false});


//==================================================
// 自動スクロール
//==================================================

document.getElementById("playBtn").onclick = ()=>{

    if(autoScroll) return;

    //==============================
    // コンテストモード
    //==============================

    if(mode==="contest"){

        if(contestTime===0){

            alert("コンテスト時間を入力してください。");
            return;

        }

        if(remainingTime===0){

            remainingTime = contestTime;

        }

    }

    //==============================
    // 音声再生
    //==============================

if (soundEnabled) {

    if (mode === "lesson") {

        lessonAudio.play();

    } else {

        if (!contestTTSPlayed) {

            getContestTTS(currentContest).then(text => {

                Voice.speakJP(text);

            });

            contestTTSPlayed = true;

        }

    }

}

    // スクロール距離
    const totalScroll =
        pages.scrollHeight - viewer.clientHeight;

    // 自動速度計算
    autoSpeed = totalScroll / contestTime / 60;

    // コンテストタイマー開始
    if(mode==="contest"){

        timerInterval = setInterval(()=>{

            remainingTime--;

            updateTimerDisplay();

            if(remainingTime <= 0){

                remainingTime = 0;

                updateTimerDisplay();

                clearInterval(timerInterval);
                timerInterval = null;

                clearInterval(autoScroll);
                autoScroll = null;

            }

        },1000);

    }

    // 自動スクロール開始
    autoScroll = setInterval(()=>{

        if(mode==="contest"){

            y -= autoSpeed;

        }else{

            y -= speed;

        }

        pages.style.transform = `translateY(${y}px)`;

    },16);

};

//==================================================
// 一時停止
//==================================================

document.getElementById("pauseBtn").onclick = ()=>{

    // スクロール停止
    clearInterval(autoScroll);
    autoScroll = null;

    // タイマー停止
    clearInterval(timerInterval);
    timerInterval = null;

    // 授業モード
    if(mode === "lesson" && soundEnabled){

        lessonAudio.pause();

    }

    // コンテストモード
    if(mode === "contest"){

        speechSynthesis.cancel();

    }

};

//==================================================
// 速度変更
//==================================================

function updateSpeed(){

    document.getElementById("speedText").textContent = speed.toFixed(1);

}

document.getElementById("speedUpBtn").onclick=()=>{

    speed +=0.2;

    updateSpeed();

};

document.getElementById("speedDownBtn").onclick=()=>{

    if(speed>0.2){

        speed -=0.2;

        updateSpeed();

    }

};

//==================================================
// リセット
//==================================================

document.getElementById("resetBtn").onclick = ()=>{

    // スクロール停止
    clearInterval(autoScroll);
    autoScroll = null;

    // タイマー停止
    clearInterval(timerInterval);
    timerInterval = null;

    // 残り時間を初期化
    remainingTime = 0;

    // スクロール位置を先頭へ
    y = 0;
    pages.style.transform = `translateY(${y}px)`;

    if(mode==="lesson"){

        lessonAudio.pause();
        lessonAudio.currentTime = 0;

    }

    // タイマー表示を初期状態へ戻す
    if(mode==="contest"){

        remainingTime = contestTime;
        updateTimerDisplay();

    }else{

        timerInput.value = "00:00";

    }

};

//==================================================
// 音声ON/OFF
//==================================================

soundBtn.onclick = ()=>{

    soundEnabled = !soundEnabled;

    if(soundEnabled){

        soundBtn.textContent = "🔊";
        soundBtn.title = "音声 ON";

    }else{

        soundBtn.textContent = "🔇";
        soundBtn.title = "音声 OFF";

    }

};

//==================================================
// モード切替
//==================================================

modeBtn.onclick = async () => {

    if(mode === "lesson"){

        mode = "contest";

        modeBtn.textContent = "コンテストモード";

        timerInput.readOnly = false;

        document.getElementById("speedDownBtn").style.display = "none";
        document.getElementById("speedUpBtn").style.display = "none";
        document.getElementById("speedText").style.display = "none";

        // 画像切替
        await loadImages();

        // 先頭へ戻る
        y = 0;
        pages.style.transform = `translateY(${y}px)`;

    }else{

        mode = "lesson";

        modeBtn.textContent = "授業モード";

        timerInput.readOnly = true;

        document.getElementById("speedDownBtn").style.display = "";
        document.getElementById("speedUpBtn").style.display = "";
        document.getElementById("speedText").style.display = "";

        // 画像切替
        await loadImages();

        // 先頭へ戻る
        y = 0;
        pages.style.transform = `translateY(${y}px)`;

    }



};

//==================================================
// タイマー入力
//==================================================

timerInput.addEventListener("change",()=>{

    const pattern = /^\d{2}:\d{2}$/;

    if(!pattern.test(timerInput.value)){

        alert("時間は MM:SS 形式で入力してください。");

        timerInput.value = "00:00";

    }

    const parts = timerInput.value.split(":");

    contestTime =
        Number(parts[0]) * 60 +
        Number(parts[1]);


});

//==================================================
// タイマー表示更新
//==================================================

function updateTimerDisplay(){

    const min = Math.floor(remainingTime / 60);
    const sec = remainingTime % 60;

    timerInput.value =
        String(min).padStart(2,"0")
        + ":"
        + String(sec).padStart(2,"0");

}

//==================================================
// 初期化
//==================================================

(async () => {

    Voice.init();

    await loadImages();

    updateSpeed();

})();

</script>

</body>
</html>
