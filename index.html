<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>朗読プロンプター</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
}

#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#1f2937;
    color:white;
}

#logoArea{
    display:flex;
    align-items:center;
    gap:12px;
}

#logo{
    height:42px;
}

#title{
    font-size:24px;
    font-weight:bold;
}

#timer{
    font-size:24px;
    font-weight:bold;
}
</style>

</head>

<body>

<header id="header">

    <div id="logoArea">
        <img src="トータルロゴ.png" id="logo">
        <span id="title">朗読プロンプター</span>
    </div>

    <div id="timer">00:00</div>

</header>

</body>
</html>
