<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>朗読プロンプター</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
}

#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#1f2937;
    color:white;
}

#logoArea{
    display:flex;
    align-items:center;
    gap:12px;
}

#logo{
    height:42px;
}

#title{
    font-size:24px;
    font-weight:bold;
}

#timer{
    font-size:24px;
    font-weight:bold;
}

#viewer{
    position:relative;
    height:calc(100vh - 70px);
    overflow:hidden;
    background:white;
}

#pages{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

#pages img{
    width:80%;
    height:auto;
}

</style>

</head>

<body>

<header id="header">

    <div id="logoArea">
        <img src="トータルロゴ.png" id="logo">
        <span id="title">朗読プロンプター</span>
    </div>

    <div id="timer">00:00</div>

</header>

<main id="viewer">

    <div id="pages">

    </div>

    <div id="guideLine"></div>

</main>

<div id="pages">
    <img src="mina/lesson01/001.jpg" id="page1">
</div>

</body>
</html>
