<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>朗読プロンプター</title>

<style>

/*==================================================
  基本
==================================================*/

body{
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
}


/*==================================================
  ヘッダー
==================================================*/

#header{
    display:flex;
    align-items:center;
    padding:10px 20px;
    background:#1f2937;
    color:white;
}

#logoArea{
    display:flex;
    align-items:center;
    gap:12px;
}

#modeArea{
    flex:1;
    display:flex;
    justify-content:center;
}

#modeBtn{
    width:auto;
    height:36px;
    padding:0 12px;
    white-space:nowrap;
}

#logo{
    height:42px;
}

#title{
    font-size:24px;
    font-weight:bold;
}

#timer{
    font-size:24px;
    font-weight:bold;
}

#timerInput{
    width:60px;
    border:none;
    background:transparent;
    color:white;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    outline:none;
}

/*==================================================
  ビューア
==================================================*/

#viewer{
    position:relative;
    height:calc(100vh - 70px);
    overflow:hidden;
    background:white;
}

#pages{
    position:absolute;
    left:0;
    top:0;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    transition:transform 0.05s linear;
}

#guideLine{
    position:absolute;

    top:65%;
    left:0;

    width:100%;
    height:2px;

    background:red;

    pointer-events:none;
}


/*==================================================
  コントロール
==================================================*/

#controlArea{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:flex-end;
}

#controlArea button{
    width:36px;
    height:36px;
    font-size:18px;
    cursor:pointer;
}

#modeBtn{
    width:auto;
    padding:0 12px;
}

</style>

</head>

<body>


<!--==================================================
    ヘッダー
===================================================-->

<header id="header">

    <!-- 左 -->
    <div id="logoArea">
        <img src="トータルロゴ.png" id="logo">
        <span id="title">朗読プロンプター</span>
    </div>

    <!-- 中央 -->
    <div id="modeArea">
        <button id="modeBtn">授業モード</button>
    </div>

    <!-- 右 -->
    <div id="controlArea">

        <button id="playBtn">▶</button>

        <button id="pauseBtn">⏸</button>

        <button id="resetBtn">⏮</button>

        <button id="speedDownBtn">－</button>

        <span id="speedText">1.0</span>

        <button id="speedUpBtn">＋</button>

        <div id="timer">
            <span>⏱</span>

            <input
                id="timerInput"
                type="text"
                value="00:00"
                maxlength="5"
                readonly
            >
        </div>

    </div>

</header>

<!--==================================================
    ビューア
===================================================-->

<main id="viewer">

    <div id="pages">
        <img src="mina/lesson01/001.jpg" id="page1">
    </div>

    <div id="guideLine"></div>

</main>


<!--==================================================
    JavaScript
===================================================-->

<script>


//==================================================
// 変数
//==================================================

let y = 0;
let speed = 1.0;
let autoScroll = null;
let mode = "lesson";

let contestTime = 0;
let autoSpeed = 0;

let timerInterval = null;
let remainingTime = 0;

//==================================================
// 要素取得
//==================================================

const pages = document.getElementById("pages");
const modeBtn = document.getElementById("modeBtn");
const timerInput = document.getElementById("timerInput");
const timerText = document.getElementById("timerInput");

const viewer = document.getElementById("viewer");
const page1 = document.getElementById("page1");

//==================================================
// 手動スクロール
//==================================================

document.addEventListener("wheel",(e)=>{

    e.preventDefault();

    y -= e.deltaY * 0.5;

    pages.style.transform = `translateY(${y}px)`;

},{passive:false});


//==================================================
// 自動スクロール
//==================================================

document.getElementById("playBtn").onclick = ()=>{

    if(autoScroll) return;

    // コンテストモード
    if(mode==="contest"){

        // 時間未入力
        if(contestTime===0){

            alert("コンテスト時間を入力してください。");
            return;

        }

        // 初回のみ時間セット
        if(remainingTime===0){

            remainingTime = contestTime;

        }

    }

    // スクロール距離
    const totalScroll =
        page1.offsetHeight - viewer.clientHeight;

    console.log(totalScroll);

    // 自動速度計算
    autoSpeed = totalScroll / contestTime / 60;

    console.log(autoSpeed);

    // コンテストタイマー開始
    if(mode==="contest"){

        timerInterval = setInterval(()=>{

            remainingTime--;

            console.log(remainingTime);

            updateTimerDisplay();

            if(remainingTime <= 0){

                remainingTime = 0;

                updateTimerDisplay();

                clearInterval(timerInterval);
                timerInterval = null;

                clearInterval(autoScroll);
                autoScroll = null;

            }

        },1000);

    }

    // 自動スクロール開始
    autoScroll = setInterval(()=>{

        if(mode==="contest"){

            y -= autoSpeed;

        }else{

            y -= speed;

        }

        pages.style.transform = `translateY(${y}px)`;

    },16);

};


// 一時停止
document.getElementById("pauseBtn").onclick = ()=>{

    clearInterval(autoScroll);
    autoScroll = null;

    clearInterval(timerInterval);
    timerInterval = null;

};
//==================================================
// 速度変更
//==================================================

function updateSpeed(){

    document.getElementById("speedText").textContent = speed.toFixed(1);

}

document.getElementById("speedUpBtn").onclick=()=>{

    speed +=0.2;

    updateSpeed();

};

document.getElementById("speedDownBtn").onclick=()=>{

    if(speed>0.2){

        speed -=0.2;

        updateSpeed();

    }

};


//==================================================
// リセット
//==================================================

document.getElementById("resetBtn").onclick = ()=>{

    // スクロール停止
    clearInterval(autoScroll);
    autoScroll = null;

    // タイマー停止
    clearInterval(timerInterval);
    timerInterval = null;

    // 残り時間を初期化
    remainingTime = 0;

    // スクロール位置を先頭へ
    y = 0;
    pages.style.transform = `translateY(${y}px)`;

};


//==================================================
// モード切替
//==================================================

modeBtn.onclick=()=>{

    if(mode==="lesson"){

        mode="contest";

        modeBtn.textContent = "コンテストモード";

        timerInput.readOnly = false;

        document.getElementById("speedDownBtn").style.display="none";
        document.getElementById("speedUpBtn").style.display="none";
        document.getElementById("speedText").style.display="none";

    }else{

        mode="lesson";

        modeBtn.textContent = "授業モード";

        timerInput.readOnly = true;

        document.getElementById("speedDownBtn").style.display="";
        document.getElementById("speedUpBtn").style.display="";
        document.getElementById("speedText").style.display="";

    }

};

//==================================================
// タイマー入力
//==================================================

timerInput.addEventListener("change",()=>{

    const pattern = /^\d{2}:\d{2}$/;

    if(!pattern.test(timerInput.value)){

        alert("時間は MM:SS 形式で入力してください。");

        timerInput.value = "00:00";

    }

    const parts = timerInput.value.split(":");

    contestTime =
        Number(parts[0]) * 60 +
        Number(parts[1]);


});

//==================================================
// タイマー表示更新
//==================================================

function updateTimerDisplay(){

    const min = Math.floor(remainingTime / 60);
    const sec = remainingTime % 60;

    timerText.value =
        String(min).padStart(2,"0")
        + ":"
        + String(sec).padStart(2,"0");

}

//==================================================
// 初期化
//==================================================

updateSpeed();

</script>

</body>
</html>
